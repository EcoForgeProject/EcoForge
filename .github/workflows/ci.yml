name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # or match your local

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8 pylint black ruff

    - name: Lint with flake8
      run: flake8 . --count --max-line-length=120 --ignore=E203,W503 --exclude=.git,__pycache__,venv,*.ipynb --statistics || true  # || true = don't fail job on warnings

    - name: Lint with pylint
      run: pylint --disable=missing-docstring,invalid-name --max-line-length=120 simulations/ src/ *.py || true

    - name: Format check with black
      run: black --check --diff . || true
